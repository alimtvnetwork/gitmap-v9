name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manual escape hatches for the golangci-lint baseline cache. Use when
    # the cached baseline appears stale (e.g. linter version bump,
    # configuration change, or false-positive from a partial earlier run).
    #
    #   lint_baseline_cache_version
    #     Bumps the cache key suffix. Old caches are abandoned; the next
    #     main-branch run reseeds under the new version. Free-form string
    #     (e.g. "v2", "2026-04-21"). Default "v1" preserves history.
    #
    #   lint_baseline_disable
    #     When "true", skips both the restore and save steps for this run.
    #     The diff job enters seeding mode (exits 0, surfaces all current
    #     findings as warnings) without touching the cache. Use to
    #     diagnose suspected stale-cache issues without losing history.
    inputs:
      lint_baseline_cache_version:
        description: "Bump to invalidate the golangci-lint baseline cache (e.g. v2)"
        required: false
        default: "v1"
        type: string
      lint_baseline_disable:
        description: "Skip restoring/saving the lint baseline cache for this run"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default permissions for all jobs. The lint-baseline-diff job needs
# `pull-requests: write` so peter-evans/create-or-update-comment can
# post the actionable suggestions sticky comment. `contents: read` is
# the standard checkout grant. Keep this minimal — any job that needs
# more (e.g. release publishing) should override at the job level.
permissions:
  contents: read
  pull-requests: write

jobs:
  sha-check:
    name: Check if already built
    runs-on: ubuntu-latest
    outputs:
      already-built: ${{ steps.cache-check.outputs.cache-hit }}
    steps:
      - name: Check SHA cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}
          lookup-only: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed lint"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Go vet
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        run: go vet ./...

      - name: golangci-lint
        if: needs.sha-check.outputs.already-built != 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: gitmap
          args: --timeout=5m

  lint-baseline-diff:
    # Soft-gate companion to `lint`. Runs golangci-lint with --issues-exit-code=0
    # so the raw report is collected even when findings exist, then diffs the
    # current findings against the baseline cached from the last successful
    # main run. Fails ONLY when NEW findings appear (added in this PR /
    # commit). Pre-existing findings are surfaced as UNCHANGED in the
    # summary but do not block the build — this lets contributors land
    # incremental improvements without being forced to fix every
    # historical lint issue at once.
    #
    # Cache strategy:
    #   - Restore key:  golangci-baseline-main (rolling, single slot).
    #   - Save:         only on push to main, after a green diff run.
    #   - Miss:         seeding mode — script exits 0 and prints all
    #                   current findings as warnings so the next run has
    #                   a baseline to diff against.
    name: Lint Baseline Diff
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "SHA ${{ github.sha }} already passed lint baseline diff"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Restore baseline from last successful main run
        id: baseline-cache
        # Skip the restore entirely when the operator dispatched the
        # workflow with lint_baseline_disable=true. Combined with the
        # matching guard on the save step below, this gives a clean
        # "ignore the cache for one run" toggle without manual cache
        # deletion via the GitHub UI.
        if: |
          needs.sha-check.outputs.already-built != 'true' &&
          inputs.lint_baseline_disable != true
        uses: actions/cache/restore@v4
        with:
          path: /tmp/lint-baseline
          # Cache key includes a version suffix (default "v1") that an
          # operator can bump via workflow_dispatch to abandon a stale
          # baseline. The restore-keys fallback also carries the version
          # so we never accidentally restore a pre-bump baseline.
          key: golangci-baseline-main-${{ inputs.lint_baseline_cache_version || 'v1' }}-${{ github.sha }}
          restore-keys: |
            golangci-baseline-main-${{ inputs.lint_baseline_cache_version || 'v1' }}-

      - name: Install golangci-lint v1.64.8
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint (JSON, non-blocking)
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        shell: bash
        run: |
          mkdir -p /tmp/lint-current
          # --issues-exit-code=0: never let the linter itself fail this
          # job — the diff script is the sole gate. --out-format=json:
          # structured report so lint-diff.py can normalize findings.
          golangci-lint run \
            --timeout=5m \
            --issues-exit-code=0 \
            --out-format=json \
            > /tmp/lint-current/report.json

      - name: Diff vs baseline (fail only on NEW findings)
        if: needs.sha-check.outputs.already-built != 'true'
        shell: bash
        env:
          BASELINE_DISABLED: ${{ inputs.lint_baseline_disable || 'false' }}
        run: |
          BASELINE=/tmp/lint-baseline/report.json
          # When disabled via dispatch, force seeding mode by pointing at
          # an empty path so lint-diff.py treats it as "no baseline".
          if [ "$BASELINE_DISABLED" = "true" ]; then
            echo "::notice::Baseline cache disabled by workflow_dispatch input — seeding mode."
            BASELINE=""
          elif [ ! -f "$BASELINE" ]; then
            echo "::notice::No baseline found — this run will seed the cache."
          fi
          python3 .github/scripts/lint-diff.py \
            --current /tmp/lint-current/report.json \
            --baseline "$BASELINE"

      - name: Promote current report to baseline (main only)
        # Refresh the rolling cache after a clean diff on the main branch
        # so subsequent PRs diff against the latest known-good state.
        # PRs deliberately skip this step — only main moves the baseline.
        if: |
          success() &&
          needs.sha-check.outputs.already-built != 'true' &&
          inputs.lint_baseline_disable != true &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/lint-baseline
          cp /tmp/lint-current/report.json /tmp/lint-baseline/report.json

      - name: Save baseline cache (main only)
        if: |
          success() &&
          needs.sha-check.outputs.already-built != 'true' &&
          inputs.lint_baseline_disable != true &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: /tmp/lint-baseline
          key: golangci-baseline-main-${{ inputs.lint_baseline_cache_version || 'v1' }}-${{ github.sha }}

      - name: Upload current lint report
        if: always() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: golangci-lint-report
          path: /tmp/lint-current/report.json
          retention-days: 14

      - name: Generate actionable lint suggestions
        # Runs whether the diff passed or failed: a passing diff still
        # yields useful "no new findings" confirmation in the comment,
        # and a failing diff is exactly when contributors most want
        # the per-rule fix templates. Writing to GITHUB_STEP_SUMMARY
        # also surfaces the suggestions in the Actions run UI.
        if: always() && needs.sha-check.outputs.already-built != 'true'
        shell: bash
        run: |
          BASELINE=/tmp/lint-baseline/report.json
          if [ "${{ inputs.lint_baseline_disable }}" = "true" ]; then
            BASELINE=""
          fi
          mkdir -p /tmp/lint-suggestions
          python3 .github/scripts/lint-suggest.py \
            --current /tmp/lint-current/report.json \
            --baseline "$BASELINE" \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --out /tmp/lint-suggestions/comment.md
          # Mirror to the run summary so the suggestions are visible
          # even on push events (no PR to comment on).
          cat /tmp/lint-suggestions/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload suggestions artifact
        if: always() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lint-suggestions
          path: /tmp/lint-suggestions/comment.md
          retention-days: 14

      - name: Find existing PR comment
        # Sticky comment: peter-evans/find-comment locates the previous
        # comment by the COMMENT_MARKER sentinel that lint-suggest.py
        # embeds, and create-or-update-comment edits it in place. This
        # avoids spamming the PR with a fresh comment on every push.
        # Skipped on push/dispatch (no PR context) and on the
        # already-built fast-path.
        if: |
          always() &&
          needs.sha-check.outputs.already-built != 'true' &&
          github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: find-lint-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- gitmap-lint-suggestions -->'

      - name: Create or update sticky comment
        if: |
          always() &&
          needs.sha-check.outputs.already-built != 'true' &&
          github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-lint-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/lint-suggestions/comment.md
          edit-mode: replace

  cmd-naming-check:
    # Guards against collision-prone helper names in the single-namespace
    # gitmap/cmd package. Background: every file in cmd/ shares one Go
    # namespace, so two files declaring `func invokeRelease(...)` produces
    # a "redeclared in this block" build break. This check fails fast (no
    # Go toolchain needed) before lint/test, so contributors get an
    # actionable rename hint instead of a cryptic vet error later.
    name: cmd/ Naming Check
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "SHA ${{ github.sha }} already passed cmd/ naming check"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - name: Run naming guard
        if: needs.sha-check.outputs.already-built != 'true'
        shell: bash
        run: bash .github/scripts/check-cmd-naming.sh gitmap/cmd

  constants-naming-check:
    # Guards the constants/ package against new constants that lack the
    # canonical Cmd*/Msg*/Err*/Flag*/Default* prefix. Uses a grandfathered
    # baseline (.github/scripts/constants-baseline.txt) so existing legacy
    # prefixes (Doctor*, Git*, Tool*, ...) are exempt — only NEW constants
    # added after the baseline must comply. Bends the curve toward
    # convergence without breaking the build today.
    name: constants/ Naming Check
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "SHA ${{ github.sha }} already passed constants/ naming check"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - name: Install gawk (defensive — script is mawk-portable too)
        if: needs.sha-check.outputs.already-built != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gawk

      - name: Run constants naming guard
        if: needs.sha-check.outputs.already-built != 'true'
        shell: bash
        run: bash .github/scripts/check-constants-naming.sh

  constants-collision-check:
    # Static audit of gitmap/constants/constants_*.go that fails when:
    #   [1] the same identifier is declared in two files (would break go build
    #       with "redeclared in this block" — exactly the v3.25.0
    #       HelpGitHubDesktop regression that motivated this guard),
    #   [2] two identifiers in different files lowercase to the same string
    #       (latent confusion risk), or
    #   [3] the same identifier is declared twice in one file.
    # The Python parser is string-literal aware so SQL keywords (FROM, WHERE,
    # VALUES, ...) inside multi-line raw-string SQL constants are NEVER
    # mistaken for identifiers.
    name: constants/ Collision Check
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "SHA ${{ github.sha }} already passed constants/ collision check"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - name: Run constants collision audit
        if: needs.sha-check.outputs.already-built != 'true'
        shell: bash
        run: python3 .github/scripts/check-constants-collisions.py

  generate-check:
    # Guarantees that every Cmd* constant added to a scanned constants_*.go
    # is reflected in completion/allcommands_generated.go. If a contributor
    # forgets to run `go generate ./...`, this job fails with a diff so the
    # tab-completion list never silently drifts from the source of truth.
    name: Generate Drift Check
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed generate drift check"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Run go generate
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        run: go generate ./...

      - name: Fail if generated files drifted
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::Generated files are out of sync with constants."
            echo "::error::Run 'cd gitmap && go generate ./...' locally and commit the result."
            echo ""
            echo "Drifted files:"
            git diff --name-only
            exit 1
          fi
          echo "✅ All generated files are in sync."

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed vulncheck"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Install govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out
          rc=$?
          if [ $rc -ne 0 ]; then
            if grep "packages you import" /tmp/vulncheck.out | grep -qv "0 vulnerabilities in packages"; then
              echo "::error::Third-party vulnerabilities detected"
              exit 1
            fi
            echo "::warning::Only stdlib vulnerabilities found (no fix available in current Go version)"
          fi

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [sha-check, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            packages: ./clonenext/... ./cloner/... ./cmd/... ./config/... ./formatter/... ./mapper/... ./release/...
          - name: store
            packages: ./tests/store_test/...
          - name: integration
            packages: ./tests/cmd_test/... ./tests/constants_test/... ./tests/release_test/...
          - name: tui
            packages: ./tui/...
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed tests (${{ matrix.name }})"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Run tests
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        shell: bash
        run: |
          set -uo pipefail
          set +e
          go test ${{ matrix.packages }} -v -count=1 -coverprofile=coverage-${{ matrix.name }}.out -covermode=atomic 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "  FAILED TESTS (${{ matrix.name }})"
            echo "========================================="
            grep -E -A 5 '^--- FAIL:' test-output.txt || true
            echo "========================================="
          fi

          exit "$exit_code"

      - name: Upload test results
        if: always() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: |
            gitmap/test-output.txt
            gitmap/coverage-${{ matrix.name }}.out
          retention-days: 7

  full-suite-guard:
    # Belt-and-suspenders gate that mirrors what a contributor runs locally:
    # `go test ./...` across EVERY package + a strict `golangci-lint run`
    # over the whole module. The matrixed `test` job above shards by
    # package group for parallel speed, but new top-level packages
    # (e.g. archive/, downloaderconfig/) are easy to forget when
    # extending the matrix. This job catches that drift by globbing
    # every package, so unannounced packages can't ship without test
    # execution. The strict lint pass also fails fast on any
    # exhaustive/unparam/errorlint regression — these were exactly
    # the rules that leaked through in v3.58.x and motivated this guard.
    name: Full Suite Guard
    runs-on: ubuntu-latest
    needs: sha-check
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "SHA ${{ github.sha }} already passed full-suite guard"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: go test ./... (every package)
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        run: go test ./... -count=1

      - name: golangci-lint (strict, full suite)
        if: needs.sha-check.outputs.already-built != 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: gitmap
          # --max-issues-per-linter=0 / --max-same-issues=0 disable the
          # default truncation in .golangci.yml so EVERY finding (not
          # just the first 50) blocks the merge. Belt-and-suspenders
          # vs. the lint job above, which honors the truncation cap.
          args: --timeout=5m --max-issues-per-linter=0 --max-same-issues=0

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [sha-check, lint, lint-baseline-diff, vulncheck, generate-check, cmd-naming-check, constants-naming-check, constants-collision-check, test, full-suite-guard]
    if: always()
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed all tests"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Download all test results
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: results

      - name: Aggregate and report failures
        if: needs.sha-check.outputs.already-built != 'true'
        shell: bash
        run: bash .github/scripts/test-summary.sh results

      - name: Coverage report
        if: always() && needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        shell: bash
        run: |
          echo ""
          echo "========================================="
          echo "  COVERAGE BY PACKAGE"
          echo "========================================="

          # Merge all coverage profiles
          echo "mode: atomic" > combined-coverage.out
          for f in ../results/test-results-*/coverage-*.out; do
            if [ -f "$f" ]; then
              grep -v '^mode:' "$f" >> combined-coverage.out 2>/dev/null || true
            fi
          done

          if [ "$(wc -l < combined-coverage.out)" -le 1 ]; then
            echo "No coverage data collected."
            exit 0
          fi

          # Per-package breakdown
          go tool cover -func=combined-coverage.out | \
            awk '
              /^total:/ { total=$NF; next }
              {
                pkg=$1; sub(/\/[^/]+$/, "", pkg)
                if (!(pkg in seen)) { seen[pkg]=1; order[++n]=pkg }
                split($NF, a, "%"); pct[pkg] += a[1]; cnt[pkg]++
              }
              END {
                for (i=1; i<=n; i++) {
                  p = order[i]
                  avg = pct[p] / cnt[p]
                  printf "  %-55s %5.1f%%\n", p, avg
                }
                printf "\n  %-55s %s\n", "Total", total
              }
            '

          echo "========================================="

      - name: Mark SHA as built
        if: success() && needs.sha-check.outputs.already-built != 'true'
        run: mkdir -p /tmp/ci-passed && echo "${{ github.sha }}" > /tmp/ci-passed/sha.txt

      - name: Save SHA to cache
        if: success() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [sha-check, test-summary]
    if: always() && needs.test-summary.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: windows
            arch: arm64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already built (${{ matrix.os }}/${{ matrix.arch }})"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Build binary
        if: needs.sha-check.outputs.already-built != 'true'
        working-directory: gitmap
        run: |
          VERSION="dev-${GITHUB_SHA::10}"
          LDFLAGS="-s -w -X 'github.com/alimtvnetwork/gitmap-v6/gitmap/constants.Version=$VERSION'"
          OUTPUT="gitmap-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          echo "Building $OUTPUT..."
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags "$LDFLAGS" -o "$OUTPUT" .
          echo "✅ Built $OUTPUT ($(du -h "$OUTPUT" | cut -f1))"

      - name: Upload binary
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gitmap-${{ matrix.os }}-${{ matrix.arch }}
          path: gitmap/gitmap-*
          retention-days: 14

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [sha-check, build]
    if: always() && needs.build.result == 'success'
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already built all targets"

      - name: Download all binaries
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: gitmap-*
          path: binaries

      - name: Print build summary
        if: needs.sha-check.outputs.already-built != 'true'
        shell: bash
        run: |
          echo ""
          echo "========================================="
          echo "  BUILD SUMMARY"
          echo "========================================="
          echo ""
          printf "  %-45s %s\n" "Binary" "Size"
          printf "  %-45s %s\n" "---------------------------------------------" "--------"

          total_size=0
          count=0

          for dir in binaries/gitmap-*; do
            if [ ! -d "$dir" ]; then continue; fi
            for file in "$dir"/*; do
              if [ ! -f "$file" ]; then continue; fi
              name=$(basename "$file")
              size=$(stat --format="%s" "$file" 2>/dev/null || stat -f "%z" "$file" 2>/dev/null)
              human=$(numfmt --to=iec --suffix=B "$size" 2>/dev/null || echo "${size}B")
              printf "  %-45s %s\n" "$name" "$human"
              total_size=$((total_size + size))
              count=$((count + 1))
            done
          done

          echo ""
          total_human=$(numfmt --to=iec --suffix=B "$total_size" 2>/dev/null || echo "${total_size}B")
          echo "  Total: $count binaries, $total_human"
          echo "========================================="

